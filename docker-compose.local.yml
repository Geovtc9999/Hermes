# Stack locale Hermes : pgvector + MinIO (dev Windows/Linux avec Docker)
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#   copy .env.local.example .env   (ou setup_env.ps1 -LocalDev)
#   python ..\09-CEGID\_ingest_corpus_hermes.py

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes_local
      POSTGRES_DB: hermes
    ports:
      - "54333:5432"
    volumes:
      - hermes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hermes
      MINIO_ROOT_PASSWORD: hermes_local_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hermes_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 hermes hermes_local_secret &&
      mc mb -p local/cegid-sources || true &&
      exit 0
      "

volumes:
  hermes_pg_data:
  hermes_minio_data:
